name: Prisma Migrations

on:
  push:
    branches: [ main, master ]

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Check Prisma migration status
        shell: bash
        run: |
          echo "Checking Prisma migration status..."
          npx prisma migrate status --schema prisma/schema.prisma
      - name: Prepare Prisma database URLs
        shell: bash
        env:
          DATABASE_URL_SECRET: ${{ secrets.DATABASE_URL }}
          DIRECT_URL_SECRET: ${{ secrets.DIRECT_URL }}
          POSTGRES_PRISMA_URL_SECRET: ${{ secrets.POSTGRES_PRISMA_URL }}
          POSTGRES_URL_SECRET: ${{ secrets.POSTGRES_URL }}
          POSTGRES_URL_NON_POOLING_SECRET: ${{ secrets.POSTGRES_URL_NON_POOLING }}
        run: |
          MIGRATION_URL=""
          MIGRATION_URL_SOURCE=""

          if [[ -n "$POSTGRES_URL_NON_POOLING_SECRET" ]]; then
            MIGRATION_URL="$POSTGRES_URL_NON_POOLING_SECRET"
            MIGRATION_URL_SOURCE="POSTGRES_URL_NON_POOLING"
          elif [[ -n "$DIRECT_URL_SECRET" ]]; then
            MIGRATION_URL="$DIRECT_URL_SECRET"
            MIGRATION_URL_SOURCE="DIRECT_URL"
          elif [[ -n "$DATABASE_URL_SECRET" ]]; then
            MIGRATION_URL="$DATABASE_URL_SECRET"
            MIGRATION_URL_SOURCE="DATABASE_URL"
          elif [[ -n "$POSTGRES_PRISMA_URL_SECRET" ]]; then
            MIGRATION_URL="$POSTGRES_PRISMA_URL_SECRET"
            MIGRATION_URL_SOURCE="POSTGRES_PRISMA_URL"
          elif [[ -n "$POSTGRES_URL_SECRET" ]]; then
            MIGRATION_URL="$POSTGRES_URL_SECRET"
            MIGRATION_URL_SOURCE="POSTGRES_URL"
          fi

          if [[ -n "$MIGRATION_URL" ]]; then
            if [[ "$MIGRATION_URL" != *"connect_timeout="* ]]; then
              if [[ "$MIGRATION_URL" == *"?"* ]]; then
                MIGRATION_URL="$MIGRATION_URL&connect_timeout=10"
              else
                MIGRATION_URL="$MIGRATION_URL?connect_timeout=10"
              fi
            fi

            echo "Using direct database URL for Prisma migrations"
            echo "DATABASE_URL=$MIGRATION_URL" >> "$GITHUB_ENV"
            echo "DIRECT_URL=$MIGRATION_URL" >> "$GITHUB_ENV"
            echo "POOLER_URL_SOURCE=$MIGRATION_URL_SOURCE" >> "$GITHUB_ENV"
          else
            echo "No database URL found; skipping migrations." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Debug Prisma database URL selection
        shell: bash
        if: env.DATABASE_URL != ''
        run: |
          echo "Prisma database URL detected."
          echo "Selected source: ${POOLER_URL_SOURCE:-unknown}"
          echo "Host: $(echo "$DATABASE_URL" | sed -E 's#^postgres(ql)?://[^@]+@([^/]+)(/.*)?$#\2#')"
          if [[ "$DATABASE_URL" == *"pooler.supabase.com"* ]]; then
            echo "Connection type: Supabase pooler"
          else
            echo "Connection type: non-pooler"
          fi
          if [[ "$DATABASE_URL" == *"connect_timeout="* ]]; then
            echo "Using connect_timeout on the database URL"
          else
            echo "No connect_timeout found on the database URL"
          fi
      - name: Run migrations
        if: env.DATABASE_URL != ''
        timeout-minutes: 10
        run: npx prisma migrate deploy
