name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: test-secret
      RATE_LIMIT_MAX: 60
      RATE_LIMIT_WINDOW_MS: 60000
      COOKIE_SECURE: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
